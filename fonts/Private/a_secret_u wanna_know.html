<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>XAUTCTF Reverse SignIn</title>

<style>
body {
    background: radial-gradient(circle at center, #001100, #000000);
    color: #00ff00;
    font-family: Consolas, monospace;
    text-align: center;
    margin-top: 60px;
}

.panel {
    width: 800px;
    margin: auto;
    border: 2px solid #00ff00;
    padding: 20px;
    box-shadow: 0 0 20px #00ff00;
}

input {
    width: 600px;
    padding: 8px;
    background: black;
    color: #00ff00;
    border: 1px solid #00ff00;
    font-size: 16px;
}

button {
    padding: 8px 20px;
    background: black;
    color: #00ff00;
    border: 1px solid #00ff00;
    cursor: pointer;
    margin-top: 10px;
}

#log {
    text-align: left;
    margin-top: 20px;
    height: 200px;
    overflow-y: auto;
    border: 1px dashed #00ff00;
    padding: 10px;
    white-space: pre-line;
}

.blink {
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

</style>
</head>

<body>

<h1>SevenSwords Reverse Challenge</h1>
<h3>Can You Reverse My Enigma?</h3>

<div class="panel">
    <p>Input Your Flag:</p>
    <input id="inputFlag" placeholder="Input Your Flag Here...">
    <br>
    <button onclick="start()">Encrypt & Verify</button>

    <div id="log"></div>
</div>

<script>

var key = 6;

var Cipher = "^GSRER@}R6jbYSYluYui6i6YC|||'{";

function log(msg) {
    var box = document.getElementById("log");
    box.innerHTML += msg + "\n";
    box.scrollTop = box.scrollHeight;
}

function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}

function xorEncrypt(str) {
    var res = "";
    for (var i = 0; i < str.length; i++) {
        res += String.fromCharCode(str.charCodeAt(i) ^ key);
    }
    return res;
}

async function start() {

    document.getElementById("log").innerHTML = "";

    var input = document.getElementById("inputFlag").value;

    log("[*] Loading Encrypt Engine...");
    await sleep(300);

    log("[*] Using my secret...");
    await sleep(500);

    log("[*] Encrypting input...");
    await sleep(700);

    var encrypted = "";

    for (var i = 0; i < input.length; i++) {
        encrypted += String.fromCharCode(input.charCodeAt(i) ^ key);
        log("  -> processing: " + input[i] + "  =>  " + encrypted[i]);
        await sleep(80);
    }

    log("\n[+] Your Encrypted Result:");
    log(encrypted);

    await sleep(400);

    log("\n[*] Comparing with secret cipher...");
    await sleep(700);

    if (encrypted === Cipher) {
        log("\nAccess Granted!");
        log("Congrats! Elite XAUTCTFer!");
    } else {
        log("\nAccess Denied!");
        log("Oops! Keep Trying...")
    }

    log("\n> System Awaiting...");
}

</script>

</body>
</html>
